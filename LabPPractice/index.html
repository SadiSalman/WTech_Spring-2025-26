<!DOCTYPE html>
<html lang="en">

<head>  
    <title>Basic contact form</title>
    <link rel="stylesheet" href="Design/style.css">
    <script src="JS/script.js"></script>
</head>

<body>

    <div class="Header">  <h1>Contact us </h1></div>
    <form>
        <table>
            <tr>
                <td><label for="fname">FIRST NAME</label></td>
                <td><label for="lname">LAST NAME</label></td>
            </tr>
            <tr>
                <td><input type="text" id="fname"  name="fname"></td>
                <td><input type="text" id="lname" name="lname"></td>
            </tr>
            <tr>
                <td><label for="email">EMAIL</label></td>
                <td><label for="phone">PHONE NUMBER</label></td>
            </tr>
            <tr>
                <td><input type="email" id="email" name="email"></td>
                <td><input type="number" id="phone" name="phone"></td>
            </tr>
            <tr>
                <td><label for="message">WHAT DO YOU HAVE IN MIND</label></td>
            </tr>
            <tr>
                <td><textarea id="message" name="message" rows="4" cols="50" placeholder="Please enter query..."></textarea></td>
            </tr>
            <tr>
                <td><input type="submit" value="Submit"></td>
            </tr>

        </table>
    </form>

</body>
</html>
